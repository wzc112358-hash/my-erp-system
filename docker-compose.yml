services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`erp.henghuacheng.cn`)"
      - "traefik.http.routers.frontend.entryPoints=websecure"
      - "traefik.http.routers.frontend.tls.certResolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  pocketbase-beijing:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-pocketbase-beijing
    command: ["./pocketbase", "serve", "--http=0.0.0.0:8090", "--dir=/pb_data_beijing"]
    volumes:
      - /root/my-erp-system/backend/pb_data_beijing:/pb_data_beijing
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beijing-api.rule=Host(`api-beijing.henghuacheng.cn`)"
      - "traefik.http.routers.beijing-api.entryPoints=websecure"
      - "traefik.http.routers.beijing-api.tls.certResolver=letsencrypt"
      - "traefik.http.services.beijing-pocketbase.loadbalancer.server.port=8090"

  pocketbase-lanzhou:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-pocketbase-lanzhou
    command: ["./pocketbase", "serve", "--http=0.0.0.0:8090", "--dir=/pb_data_lanzhou"]
    volumes:
      - /root/my-erp-system/backend/pb_data_lanzhou:/pb_data_lanzhou
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 800M
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lanzhou-api.rule=Host(`api-lanzhou.henghuacheng.cn`)"
      - "traefik.http.routers.lanzhou-api.entryPoints=websecure"
      - "traefik.http.routers.lanzhou-api.tls.certResolver=letsencrypt"
      - "traefik.http.services.lanzhou-pocketbase.loadbalancer.server.port=8090"

  opportunity-agent:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: erp-opportunity-agent
    restart: unless-stopped
    depends_on:
      - browser-worker
      - collector-service
    environment:
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_SUPERUSER_EMAIL=${POCKETBASE_SUPERUSER_EMAIL}
      - POCKETBASE_SUPERUSER_PASSWORD=${POCKETBASE_SUPERUSER_PASSWORD}
      - OPPORTUNITY_AGENT_SAMPLE_MODE=0
      - BROWSER_WORKER_URL=http://browser-worker:8095
      - BROWSER_PUBLIC_BASE_URL=${BROWSER_PUBLIC_BASE_URL:-https://browser.henghuacheng.cn}
      - BROWSER_INTERNAL_API_TOKEN=${BROWSER_INTERNAL_API_TOKEN}
      - COLLECTOR_SERVICE_URL=http://collector-service:8096
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - web
      - agent-internal

  local-helper-api:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: erp-local-helper-api
    restart: unless-stopped
    command: ["npm", "run", "local-helper-api"]
    environment:
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_SUPERUSER_EMAIL=${POCKETBASE_SUPERUSER_EMAIL}
      - POCKETBASE_SUPERUSER_PASSWORD=${POCKETBASE_SUPERUSER_PASSWORD}
      - LOCAL_HELPER_API_PORT=8097
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - web
      - agent-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.local-helper-api.rule=Host(`agent.henghuacheng.cn`) && PathPrefix(`/local-helper`)"
      - "traefik.http.routers.local-helper-api.entryPoints=websecure"
      - "traefik.http.routers.local-helper-api.tls.certResolver=letsencrypt"
      - "traefik.http.routers.local-helper-api-health.rule=Host(`agent.henghuacheng.cn`) && Path(`/health`)"
      - "traefik.http.routers.local-helper-api-health.entryPoints=websecure"
      - "traefik.http.routers.local-helper-api-health.tls.certResolver=letsencrypt"
      - "traefik.http.services.local-helper-api.loadbalancer.server.port=8097"

  collector-service:
    build:
      context: ./collector-service
      dockerfile: Dockerfile
    container_name: erp-collector-service
    restart: unless-stopped
    environment:
      - COLLECTOR_SERVICE_PORT=8096
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - agent-internal

  browser-worker:
    build:
      context: ./browser-worker
      dockerfile: Dockerfile
    container_name: erp-browser-worker
    restart: unless-stopped
    environment:
      - BROWSER_WORKER_PORT=8095
      - BROWSER_PUBLIC_BASE_URL=${BROWSER_PUBLIC_BASE_URL:-https://browser.henghuacheng.cn}
      - BROWSER_RUNTIME_MODE=playwright
      - BROWSER_PROFILE_ROOT=/browser_profiles
      - BROWSER_HEADLESS=${BROWSER_HEADLESS:-1}
      - BROWSER_ACCESS_SECRET=${BROWSER_ACCESS_SECRET}
      - BROWSER_INTERNAL_API_TOKEN=${BROWSER_INTERNAL_API_TOKEN}
    volumes:
      - /root/my-erp-system/browser_profiles:/browser_profiles
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - web
      - agent-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.browser-worker.rule=Host(`browser.henghuacheng.cn`)"
      - "traefik.http.routers.browser-worker.entryPoints=websecure"
      - "traefik.http.routers.browser-worker.tls.certResolver=letsencrypt"
      - "traefik.http.services.browser-worker.loadbalancer.server.port=8095"

  traefik:
    image: traefik:v2.9
    container_name: erp-traefik
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik:/etc/traefik
    networks:
      - web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  web:
    driver: bridge
  agent-internal:
    driver: bridge
